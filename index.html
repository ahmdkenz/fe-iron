<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/images/iron/Logo_IRON.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRON - Intelligent Record of Organization Number</title>
  <link rel="stylesheet" type="text/css" href="/loader.css" />
</head>

<body>
  <!-- Loading screen — outside #app so Vue mount doesn't remove it prematurely -->
  <div id="loading-bg">
    <div class="iron-content">
      <!-- Scatter-assemble title -->
      <div class="iron-brand-wrap">
        <span class="iron-title" id="iron-decrypt"></span>
      </div>

      <!-- Divider line -->
      <div class="iron-divider" id="iron-divider"></div>

      <!-- Progress section -->
      <div class="iron-progress-section">
        <div class="iron-progress-track">
          <div class="iron-progress-fill" id="iron-progress-fill"></div>
          <div class="iron-progress-glow" id="iron-progress-glow"></div>
        </div>
        <div class="iron-progress-meta">
          <span class="iron-status" id="iron-status">Initializing...</span>
          <span class="iron-pct"><span id="iron-progress-pct">0</span>%</span>
        </div>
      </div>
    </div>
  </div>

  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>

  <script>
    ;(function () {
      var CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789@#$%&*!?+=~';
      var TEXT  = 'Intelligent Record of Organization Number';
      var el    = document.getElementById('iron-decrypt');

      // Build individual character spans
      el.innerHTML = '';
      var charData = [];
      TEXT.split('').forEach(function (ch) {
        var span = document.createElement('span');
        span.className = 'iron-char';
        if (ch === ' ') {
          span.textContent = ' ';
          span.style.opacity = '1';
        } else {
          span.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
          span.style.opacity = '0';
        }
        el.appendChild(span);
        charData.push({ el: span, target: ch, isSpace: ch === ' ' });
      });

      // ── Phase 1: Scatter chars across viewport ─────────────────────────────
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var vw = window.innerWidth;
          var vh = window.innerHeight;

          charData.forEach(function (d) {
            if (d.isSpace) return;
            var rx  = (Math.random() - 0.5) * vw * 1.5;
            var ry  = (Math.random() - 0.5) * vh * 1.3;
            var rot = (Math.random() - 0.5) * 720;
            d.el.style.transform  = 'translate(' + rx + 'px, ' + ry + 'px) rotate(' + rot + 'deg)';
            d.el.style.opacity    = '0.25';
            d.el.style.transition = 'none';
          });

          // ── Phase 2: Assemble after 400ms scatter display ───────────────────
          setTimeout(function () {
            var settled   = 0;
            var nonSpaces = charData.filter(function (d) { return !d.isSpace; });
            var total     = nonSpaces.length;

            nonSpaces.forEach(function (d) {
              var delay = Math.random() * 500; // max 500ms stagger

              setTimeout(function () {
                // Fly to natural position
                d.el.style.transition = 'transform 0.75s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease';
                d.el.style.transform  = 'translate(0px, 0px) rotate(0deg)';
                d.el.style.opacity    = '1';

                // Scramble during flight, settle at arrival
                var ticks    = 0;
                var maxTicks = 10;
                var timer = setInterval(function () {
                  if (ticks >= maxTicks) {
                    d.el.textContent = d.target;
                    clearInterval(timer);
                    settled++;
                    if (settled >= total) {
                      setTimeout(function () {
                        var div = document.getElementById('iron-divider');
                        if (div) div.classList.add('iron-visible');
                      }, 150);
                    }
                  } else {
                    d.el.textContent = CHARS[Math.floor(Math.random() * CHARS.length)];
                    ticks++;
                  }
                }, 50);

              }, delay);
            });
          }, 400);
        });
      });

      // ── Progress Bar Simulation ─────────────────────────────────────────────
      var fill     = document.getElementById('iron-progress-fill');
      var glow     = document.getElementById('iron-progress-glow');
      var pctEl    = document.getElementById('iron-progress-pct');
      var statusEl = document.getElementById('iron-status');

      var statuses = [
        { at: 5,  text: 'Initializing modules...' },
        { at: 25, text: 'Loading configuration...' },
        { at: 45, text: 'Connecting to services...' },
        { at: 65, text: 'Verifying session...' },
        { at: 82, text: 'Almost ready...' },
      ];

      var progress  = 0;
      var statusIdx = 0;

      var progressTimer = setInterval(function () {
        var inc = progress < 50
          ? Math.random() * 7 + 3
          : progress < 75
            ? Math.random() * 4 + 1
            : Math.random() * 1.5 + 0.5;

        progress = Math.min(progress + inc, 90);

        var pct = Math.floor(progress);
        if (fill)  fill.style.width  = pct + '%';
        if (glow)  glow.style.left   = Math.max(0, pct - 4) + '%';
        if (pctEl) pctEl.textContent = pct;

        if (statusIdx < statuses.length && progress >= statuses[statusIdx].at) {
          if (statusEl) statusEl.textContent = statuses[statusIdx].text;
          statusIdx++;
        }

        if (progress >= 90) clearInterval(progressTimer);
      }, 110);

      // ── Completion Callback (called by main.js after Vue mount) ────────────
      window.__ironLoadingComplete = function () {
        clearInterval(progressTimer);
        progress = 100;

        if (fill) {
          fill.style.transition = 'width 0.35s cubic-bezier(0.4,0,0.2,1)';
          fill.style.width = '100%';
        }
        if (glow)  glow.style.left         = '96%';
        if (pctEl) pctEl.textContent       = '100';
        if (statusEl) statusEl.textContent = 'Ready.';

        setTimeout(function () {
          var bg = document.getElementById('loading-bg');
          if (bg) {
            bg.classList.add('iron-fade-out');
            setTimeout(function () {
              if (bg.parentNode) bg.parentNode.removeChild(bg);
            }, 700);
          }
        }, 350);
      };
    })();
  </script>
</body>

</html>
